<svg xmlns="http://www.w3.org/2000/svg" width="500" height="500" viewBox="0 0 100 100" role="img" aria-label="SPIReS">
  <defs>
    <linearGradient id="arc" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#60a5fa"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
    <clipPath id="badge">
      <rect x="4" y="4" width="92" height="92" rx="24"/>
    </clipPath>
  </defs>

  <!-- dark badge -->
  <rect x="4" y="4" width="92" height="92" rx="24" fill="#0b1220"/>

  <!-- snow peaks, clipped to the badge -->
  <g clip-path="url(#badge)">
    <path d="M4 82 L34 44 L48 62 L64 34 L96 82 Z" fill="#e2e8f0"/>
    <path d="M34 44 L43 57 L39 59 L29 50 Z" fill="#94a3b8"/>
    <path d="M64 34 L73 58 L57 58 Z" fill="#94a3b8"/>
  </g>

  <!-- satellite scan arc -->
  <path d="M18 30 A38 38 0 0 1 82 30" fill="none" stroke="url(#arc)" stroke-width="4.5" stroke-linecap="round"/>

  <!-- sensor / sun dot -->
  <circle cx="50" cy="16" r="4.5" fill="#22d3ee"/>

  <!-- scan ticks -->
  <g stroke="#22d3ee" stroke-width="2.4" stroke-linecap="round" opacity="0.85">
    <line x1="50" y1="24" x2="50" y2="30"/>
    <line x1="43" y1="26" x2="46" y2="31"/>
    <line x1="57" y1="26" x2="54" y2="31"/>
  </g>
</svg>
