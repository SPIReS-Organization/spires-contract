# Read the Docs configuration file
# https://docs.readthedocs.io/en/stable/config-file/v2.html

version: 2

sphinx:
  configuration: doc/source/conf.py
  fail_on_warning: false

formats:
  - pdf
  - epub

build:
  os: ubuntu-22.04
  tools:
    python: "3.11"
  jobs:
    post_checkout:
      # Full git history for setuptools_scm version detection.
      - git fetch --unshallow || true

python:
  install:
    - requirements: doc/requirements.txt
    # Install the package so autodoc can import it.
    - method: pip
      path: .
